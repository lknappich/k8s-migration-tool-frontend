name: Backend CI
on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.24', cache: true, cache-dependency-path: backend/go.sum }
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with: { working-directory: backend, args: '--timeout=5m' }

  test-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.24', cache: true, cache-dependency-path: backend/go.sum }
      - run: cd backend && go test -race -coverprofile=coverage.out -covermode=atomic ./internal/... ./tests/unit/...
      - uses: codecov/codecov-action@v4
        with: { files: backend/coverage.out, flags: backend-unit }

  test-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.24', cache: true, cache-dependency-path: backend/go.sum }
      - uses: AbsaOSS/k3d-action@v2
        with: { cluster-name: source, args: '--k3s-arg "--disable=traefik@server:0"' }
      - uses: AbsaOSS/k3d-action@v2
        with: { cluster-name: target, args: '--k3s-arg "--disable=traefik@server:0"' }
      - run: |
          mkdir -p infra/kubeconfigs
          k3d kubeconfig get source > infra/kubeconfigs/source-kubeconfig.yaml
          k3d kubeconfig get target > infra/kubeconfigs/target-kubeconfig.yaml
          bash infra/seed-source.sh
      - run: cd backend && PROJECT_ROOT=$GITHUB_WORKSPACE go test -tags=integration ./tests/... -v -count=1 -timeout 120s
      - uses: codecov/codecov-action@v4
        with: { files: backend/coverage.out, flags: backend-integration }

  build:
    runs-on: ubuntu-latest
    strategy:
      matrix: { goos: [linux], goarch: [amd64, arm64] }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.24' }
      - run: cd backend && GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -o bin/server-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/server/
      - uses: actions/upload-artifact@v4
        with: { name: binary-${{ matrix.goos }}-${{ matrix.goarch }}, path: backend/bin/ }

  docker:
    needs: [lint, test-unit, build]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with: { registry: ghcr.io, username: ${{ github.actor }}, password: ${{ secrets.GITHUB_TOKEN }} }
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository_owner }}/k8s-migration-backend
          tags: type=ref,event=branch;type=ref,event=tag;type=sha
      - uses: docker/build-push-action@v6
        with: { context: ., file: backend/Dockerfile, push: true, tags: ${{ steps.meta.outputs.tags }}, labels: ${{ steps.meta.outputs.labels }} }

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.24', cache: true, cache-dependency-path: backend/go.sum }
      - run: cd backend && go install golang.org/x/vuln/cmd/govulncheck@latest && govulncheck ./...

  release:
    needs: [lint, test-unit, test-integration, build, docker, security]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { path: artifacts }
      - run: |
          cd artifacts
          for d in binary-*; do (cd "$d" && zip -j "../../k8s-migration-backend-${d#binary-}.zip" *); done
      - uses: softprops/action-gh-release@v2
        with: { files: '*.zip', generate_release_notes: true }
