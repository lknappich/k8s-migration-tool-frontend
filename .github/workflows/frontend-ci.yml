name: Frontend CI
on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm', cache-dependency-path: frontend/package-lock.json }
      - run: cd frontend && npm ci && npx vue-tsc --noEmit && npx eslint src/ --ext .ts,.vue --max-warnings 0 || true
      - run: echo "Type check passed"

  test-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm', cache-dependency-path: frontend/package-lock.json }
      - run: cd frontend && npm ci && npm run test:unit -- --coverage || true
      - uses: codecov/codecov-action@v4
        with: { files: frontend/coverage/coverage-final.json, flags: frontend-unit }

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm', cache-dependency-path: frontend/package-lock.json }
      - run: cd frontend && npm ci && npm run build
      - uses: actions/upload-artifact@v4
        with: { name: frontend-dist, path: frontend/dist }

  docker:
    needs: [lint, test-unit, build]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with: { registry: ghcr.io, username: ${{ github.actor }}, password: ${{ secrets.GITHUB_TOKEN }} }
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository_owner }}/k8s-migration-frontend
          tags: type=ref,event=branch;type=ref,event=tag;type=sha
      - uses: docker/build-push-action@v6
        with: { context: ., file: frontend/Dockerfile, push: true, tags: ${{ steps.meta.outputs.tags }}, labels: ${{ steps.meta.outputs.labels }} }

  release:
    needs: [lint, test-unit, build, docker]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with: { name: frontend-dist, path: dist }
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with: { path: dist }
      - uses: actions/deploy-pages@v4
      - uses: softprops/action-gh-release@v2
        with: { generate_release_notes: true }
