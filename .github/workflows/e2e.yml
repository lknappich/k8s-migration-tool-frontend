name: End-to-End Tests
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create k3d source cluster
        uses: AbsaOSS/k3d-action@v2
        with: { cluster-name: source, args: '--k3s-arg "--disable=traefik@server:0"' }

      - name: Create k3d target cluster
        uses: AbsaOSS/k3d-action@v2
        with: { cluster-name: target, args: '--k3s-arg "--disable=traefik@server:0"' }

      - name: Export kubeconfigs and seed source cluster
        run: |
          mkdir -p infra/kubeconfigs
          k3d kubeconfig get source > infra/kubeconfigs/source-kubeconfig.yaml
          k3d kubeconfig get target > infra/kubeconfigs/target-kubeconfig.yaml
          bash infra/seed-source.sh

      - uses: actions/setup-go@v5
        with: { go-version: '1.24', cache: true, cache-dependency-path: go.sum }

      - name: Build backend binary
        run: go build -o bin/server ./cmd/server/

      - name: Start backend
        run: |
          nohup ./bin/server &
          sleep 3
          curl -s http://localhost:8080/api/healthz || true

      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm', cache-dependency-path: frontend/package-lock.json }

      - name: Install and start frontend
        run: |
          cd frontend
          npm ci
          npx vite --host 0.0.0.0 &
          sleep 5

      - name: Install Playwright
        run: cd frontend && npx playwright install --with-deps chromium

      - name: Run Playwright E2E tests
        run: cd frontend && npx playwright test
        continue-on-error: true

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/

      - name: Teardown
        if: always()
        run: |
          pkill -f "bin/server" || true
          pkill -f "vite" || true
          k3d cluster delete source || true
          k3d cluster delete target || true
