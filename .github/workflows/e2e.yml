name: End-to-End Tests
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create k3d source cluster
        uses: AbsaOSS/k3d-action@v2
        with: { cluster-name: source, args: '--k3s-arg "--disable=traefik@server:0"' }

      - name: Create k3d target cluster
        uses: AbsaOSS/k3d-action@v2
        with: { cluster-name: target, args: '--k3s-arg "--disable=traefik@server:0"' }

      - name: Export kubeconfigs and seed source cluster
        run: |
          mkdir -p infra/kubeconfigs
          k3d kubeconfig get source > infra/kubeconfigs/source-kubeconfig.yaml
          k3d kubeconfig get target > infra/kubeconfigs/target-kubeconfig.yaml
          bash infra/seed-source.sh

      - name: Build backend Docker image
        run: docker build -t k8s-migration-backend:ci -f backend/Dockerfile backend/

      - name: Build frontend Docker image
        run: docker build -t k8s-migration-frontend:ci -f frontend/Dockerfile frontend/

      - name: Start backend
        run: |
          docker run -d --name backend \
            --network host \
            -v ${{ github.workspace }}/infra/kubeconfigs:/kubeconfigs \
            -e SOURCE_KUBECONFIG=/kubeconfigs/source-kubeconfig.yaml \
            -e TARGET_KUBECONFIG=/kubeconfigs/target-kubeconfig.yaml \
            k8s-migration-backend:ci

      - name: Start frontend
        run: |
          docker run -d --name frontend \
            --network host \
            k8s-migration-frontend:ci

      - name: Wait for services
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/health > /dev/null 2>&1; then break; fi
            sleep 2
          done
          curl -sf http://localhost:80 > /dev/null || true

      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm', cache-dependency-path: frontend/package-lock.json }

      - name: Install Playwright dependencies
        run: cd frontend && npm ci && npx playwright install --with-deps chromium

      - name: Run Playwright E2E tests
        run: cd frontend && npx playwright test

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/

      - name: Teardown Docker containers
        if: always()
        run: docker rm -f backend frontend || true

      - name: Teardown k3d clusters
        if: always()
        run: k3d cluster delete source && k3d cluster delete target || true
